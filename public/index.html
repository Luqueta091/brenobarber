<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agenda do Barbeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header>
      <h1>Agenda do Barbeiro</h1>
      <p>Escolha a unidade e reserve em minutos.</p>
    </header>

    <main>
      <section class="grid two">
        <div class="card fade-in">
          <h2>Unidades</h2>
          <p>Agende direto pela unidade desejada.</p>
          <div class="list">
            <a class="list-item" href="/unidadeA">Unidade A</a>
            <a class="list-item" href="/unidadeB">Unidade B</a>
          </div>
        </div>
        <div class="card fade-in">
          <h2>Operação</h2>
          <p>Área exclusiva para o barbeiro.</p>
          <a class="list-item" href="/admin">Entrar no Admin</a>
        </div>
      </section>
    </main>

    <footer>Sem login para clientes. Confirmação em um passo.</footer>
  </body>
</html>
